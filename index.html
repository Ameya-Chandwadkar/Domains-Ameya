<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Survey Corps | Hackathon</title>
  <meta name="description" content="Choose your branch. Build for humanity." />
  <link rel="icon" href="favicon.ico" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <main>
    <section id="domains" class="domains-section" aria-labelledby="domains-title">

      <div class="bg-effects" aria-hidden="true">
        <div class="bg-effects__inner" id="bgEffectsInner">
          <div class="bg-grid"></div>
          <div class="bg-vignette"></div>

          <div class="bg-beam--h-top"></div>
          <div class="bg-beam--h-bottom"></div>
          <div class="bg-beam--v-left"></div>
          <div class="bg-beam--v-right"></div>

          <div class="bg-cable bg-cable--a"></div>
          <div class="bg-cable bg-cable--b"></div>
          <div class="bg-cable bg-cable--c"></div>

          <div class="bg-emblem">
            <svg viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
              <path d="M10,10 L110,10 L110,90 C110,130 60,140 60,140 C60,140 10,130 10,90 Z" fill="none" stroke="white" stroke-width="3" />
              <path d="M60,110 L50,90 L20,100 L40,70 L15,70 L45,45 L25,40 L60,30" fill="none" stroke="white" stroke-width="2" />
              <path d="M60,110 L70,90 L100,100 L80,70 L105,70 L75,45 L95,40 L60,30" fill="white" />
            </svg>
          </div>

          <div class="bg-console--a">
            <span class="bg-console__dot--red"></span>
            <span class="bg-console__dot--green"></span>
          </div>
          <div class="bg-console--b">
            <span class="bg-console__line"></span>
            <span class="bg-console__line"></span>
          </div>

          <div class="bg-redlight--a"></div>
          <div class="bg-redlight--b"></div>

          <div class="bg-fog--a"></div>
          <div class="bg-fog--b"></div>

          <div class="particles-layer" id="particlesLayer" aria-hidden="true"></div>
        </div>
      </div>

      <div class="hover-dim-overlay" id="hoverDimOverlay"></div>
      <div class="hover-accent-overlay" id="hoverAccentOverlay"></div>

      <div class="domains-content">
        <header class="domains-header">
          <div>
            <h1 id="domains-title" class="domains-title">Choose your<br /><span class="accent-red">Titans.</span></h1>
            <p class="domains-subtitle">Humanity's fate rests in your hands. Choose the power that will fight beyond the Walls.</p>
          </div>
          <p class="domains-tag">04 TITAN POWERS<br />ONE DESTINY</p>
        </header>

        <div class="pods-row" id="podsRow"></div>
      </div>

      <aside class="info-panel" id="infoPanel" role="dialog" aria-label="" hidden>
        <div class="info-panel__top-line"></div>
        <div class="info-panel__header">
          <div>
            <h2 class="info-panel__title" id="infoPanelTitle"></h2>
          </div>
          <button type="button" class="info-panel__close" id="infoPanelClose">ESC</button>
        </div>
        <p class="info-panel__description" id="infoPanelDescription"></p>
      </aside>

    </section>
  </main>

  <script src="js/domains.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
